<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Resume Builder Online</title>
<meta name="description" content="Create professional resumes online in seconds.">

</head>

<body style="background:#0f2027;color:white;padding:20px;">

<h1>Resume Builder</h1>

<p>Create ATS-friendly resumes easily.</p>

<form method="post" action="/resume">
<input name="name" placeholder="Name">
<input name="email" placeholder="Email">
<input name="phone" placeholder="Phone">
<input name="skills" placeholder="Skills">
<textarea name="education"></textarea>
<textarea name="experience"></textarea>
<button>Create Resume</button>
</form>

</body>
</html>
