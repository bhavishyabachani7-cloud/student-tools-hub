<!DOCTYPE html>
<html>
<head>
<title>BMI Calculator</title>
<meta name="description" content="Free BMI calculator for students.">
</head>

<body>

<h1>BMI Calculator</h1>
<p>Calculate your Body Mass Index easily.</p>

<form method="post" action="/bmi">
<input name="weight" placeholder="Weight in kg">
<input name="height" placeholder="Height in cm">
<button>Calculate</button>
</form>

<h2>{{bmi}}</h2>

</body>
</html>
