<!DOCTYPE html>
<html>
<head>
<title>Image Resizer</title>
<meta name="description" content="Resize images online for free.">
</head>

<body>

<h1>Image Resizer</h1>

<form method="post" action="/resize" enctype="multipart/form-data">
<input type="file" name="image">
<input name="width" placeholder="Width">
<input name="height" placeholder="Height">
<button>Resize</button>
</form>

</body>
</html>
